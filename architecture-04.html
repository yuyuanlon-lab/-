ss="brand-lockup" href="./index.html" data-text="home.title">Yuanlong Yu</a><nav class="site-nav" aria-label="Main navigation"><a class="nav-link" href="./design.html" data-text="nav.work">Work</a><a class="nav-link" href="./about.html" data-text="nav.about">About</a></nav></header><main><section class="detail-block"><div class="detail-image" data-asset-base="architecture-04" data-asset-alt="Park for all perspective rendering"></div><div class="detail-layout"><div class="detail-left"><div class="detail-meta" data-text="project.04.meta">04</div><h1 class="detail-title" data-text="project.04.title">Park for all</h1><div class="detail-subtitle-wrap"><span class="detail-mark">-</span><div class="detail-subtitle">Intergenerational Community Park</div></div><p class="detail-info" data-text="project.04.details">School work, Design studio 2021</p></div><div class="detail-right"><p class="detail-quote"><span class="detail-quote-text" data-text="project.04.quote">Make architecture like a park.</span><span class="detail-quote-author" data-text="project.04.quoteAuthor">SANAA</span></p><p class="detail-copy" data-text="project.04.copy">Instead of two separate buildings that each serve only one age group, this project imagines a park for everyone.</p></div></div><div class="detail-follow-image"><img src="./assets/images/architecture-04-axon.png" alt="Axonometric view of the Park for all proposal" loading="lazy" decoding="async"></div><div class="detail-section-gallery" aria-label="Project 04 render gallery"><button class="gallery-arrow prev" type="button" aria-label="Previous image">&#8249;</button><div class="gallery-frame"><img class="gallery-image is-active" src="./assets/images/architecture-04-gallery-01.png" alt="Park elevation rendering for Project 04" loading="lazy" decoding="async"><img class="gallery-image" src="./assets/images/architecture-04-gallery-02.png" alt="Street-level rendering for Project 04" loading="lazy" decoding="async"></div><button class="gallery-arrow next" type="button" aria-label="Next image">&#8250;</button></div></section></main></div><script src="./content/text.js"></script><script>window.applySiteText();const assetExtensions=["png","jpg","jpeg","webp","pdf"];const container=document.querySelector("[data-asset-base]");const base=container.dataset.assetBase;const altText=container.dataset.assetAlt||base;let current=0;function renderAsset(extension){if(extension==="pdf"){const frame=document.createElement("iframe");frame.src=`./assets/images/${base}.${extension}#view=FitH`;frame.title=altText;container.appendChild(frame);return;}const image=document.createElement("img");image.src=`./assets/images/${base}.${extension}`;image.alt=altText;container.appendChild(image);}function tryNext(){if(current>=assetExtensions.length){container.textContent="Missing Asset";return;}const extension=assetExtensions[current++];if(extension==="pdf"){fetch(`./assets/images/${base}.${extension}`,{method:"HEAD"}).then((response)=>{if(response.ok)renderAsset(extension);else tryNext();}).catch(tryNext);return;}const probe=new Image();probe.onload=function(){renderAsset(extension);};probe.onerror=tryNext;probe.src=`./assets/images/${base}.${extension}`;}tryNext();document.querySelectorAll(".detail-section-gallery").forEach((gallery)=>{const galleryImages=Array.from(gallery.querySelectorAll(".gallery-image"));const prevButton=gallery.querySelector(".gallery-arrow.prev");const nextButton=gallery.querySelector(".gallery-arrow.next");let activeIndex=0;function showImage(index){galleryImages.forEach((image,imageIndex)=>{image.classList.toggle("is-active",imageIndex===index);});activeIndex=index;}function stepGallery(direction){const total=galleryImages.length;showImage((activeIndex+direction+total)%total);}if(prevButton&&nextButton&&galleryImages.length>0){prevButton.addEventListener("click",()=>{stepGallery(-1);});nextButton.addEventListener("click",()=>{stepGallery(1);});}});</script></body></html>
