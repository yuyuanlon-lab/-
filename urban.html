<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-page-title="urban.pageTitle">Urban - Yuanlong Yu</title>
  <style>
    :root {
      --page-bg: #ffffff;
      --text: #6f6f6b;
      --line: #8a867f;
      --max-width: 1296px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "DIN Alternate", "DIN", "Bahnschrift", "Helvetica Neue", Arial, sans-serif;
      background: var(--page-bg);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page-shell {
      width: min(100%, var(--max-width));
      margin: 0 auto;
      padding: 18px 24px 40px;
    }

    .site-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      padding: 10px 0 14px;
      border-bottom: 1px solid var(--line);
      color: var(--text);
    }

    .brand-lockup {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .site-nav {
      display: flex;
      align-items: center;
      gap: 34px;
      flex-wrap: wrap;
    }

    .nav-link {
      font-size: 1rem;
      font-weight: 700;
    }

    main {
      padding-top: 54px;
      text-align: center;
    }

    .page-title {
      margin: 0 0 14px;
      font-size: 1.7rem;
      font-weight: 700;
      color: var(--text);
    }

    .page-copy {
      width: min(100%, 600px);
      margin: 0 auto;
      color: var(--text);
      line-height: 1.9;
      font-weight: 600;
    }

    .content-block {
      width: min(100%, 600px);
      margin: 88px auto 0;
    }

    @media (max-width: 720px) {
      .page-shell {
        padding: 16px 16px 32px;
      }

      .site-header {
        align-items: flex-start;
        flex-direction: column;
      }

      .site-nav {
        gap: 20px;
      }

      main {
        padding-top: 36px;
      }

      .content-block {
        margin-top: 68px;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <a class="brand-lockup" href="./index.html" data-text="home.title">Yuanlong Yu</a>
      <nav class="site-nav" aria-label="Main navigation">
        <a class="nav-link" href="./design.html" data-text="nav.work">Work</a>
        <a class="nav-link" href="./about.html" data-text="nav.about">About</a>
        
      </nav>
    </header>
    <main>
      <section class="content-block">
        <h1 class="page-title" data-text="urban.pageTitle">Urban</h1>
        <p class="page-copy" data-text="urban.pageCopy">Placeholder text for urban design work. You can replace this page with research, planning studies, mapping, and urban-scale projects.</p>
      </section>
    </main>
  </div>
  <script src="./content/text.js"></script>
  <script>window.applySiteText();</script>
</body>
</html>
