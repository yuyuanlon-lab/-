<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-page-title="home.title">Yuanlong Yu</title>
  <style>
    :root {
      --page-bg: #ffffff;
      --text: #6f6f6b;
      --muted: #8a867f;
      --line: #8a867f;
      --max-width: 1296px;
      --content-width: 1000px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "DIN Alternate", "DIN", "Bahnschrift", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background: var(--page-bg);
    }

    img {
      display: block;
      width: 100%;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page-shell {
      width: min(100%, var(--max-width));
      margin: 0 auto;
      padding: 18px 24px 40px;
    }

    .site-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      padding: 10px 0 14px;
      border-bottom: 1px solid var(--line);
      color: var(--text);
    }

    .brand-lockup {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .site-nav {
      display: flex;
      align-items: center;
      gap: 34px;
      flex-wrap: wrap;
    }

    .nav-item {
      position: relative;
      display: inline-flex;
      align-items: center;
    }

    .nav-link {
      font-size: 1rem;
      font-weight: 700;
    }

    .dropdown-menu {
      position: absolute;
      top: calc(100% + 10px);
      left: 50%;
      transform: translateX(-50%);
      display: none;
      min-width: 180px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid rgba(138, 134, 127, 0.55);
      text-align: left;
      z-index: 10;
    }

    .dropdown-menu::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: -10px;
      height: 10px;
    }

    .nav-item:hover .dropdown-menu,
    .nav-item:focus-within .dropdown-menu,
    .nav-item.is-open .dropdown-menu {
      display: block;
    }

    .dropdown-link {
      display: block;
      padding: 8px 10px;
      font-size: 1rem;
      font-weight: 700;
      white-space: nowrap;
      transition: background-color 160ms ease;
    }

    .dropdown-link:hover,
    .dropdown-link:focus-visible {
      background: rgba(0, 0, 0, 0.08);
    }

    main {
      padding-top: 54px;
    }

    .home-layout {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: min(100%, var(--content-width));
      margin: 0 auto;
    }

    .hero-block {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .hero-image-frame {
      width: 100%;
      aspect-ratio: 1.35 / 0.9;
      background: #e9dfd0;
      overflow: hidden;
    }

    .hero-image-frame img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .intro-block {
      width: min(100%, 720px);
      margin: 34px auto 0;
      text-align: center;
    }

    .intro-line {
      margin: 0;
      color: var(--text);
      font-size: 0.98rem;
      font-weight: 500;
      line-height: 1.8;
      letter-spacing: 0.01em;
    }

    .anchor-section {
      width: min(100%, 600px);
      margin-top: 88px;
      text-align: center;
    }

    .anchor-title {
      margin: 0 0 14px;
      font-size: 1.7rem;
      font-weight: 700;
      color: var(--text);
    }

    .anchor-copy,
    .footer-copy {
      margin: 0;
      color: var(--text);
      line-height: 1.9;
      font-weight: 600;
    }

    .site-footer {
      padding-top: 80px;
      text-align: center;
    }

    .footer-copy {
      width: min(100%, 600px);
      margin: 0 auto;
    }

    @media (max-width: 720px) {
      .page-shell {
        padding: 16px 16px 32px;
      }

      .site-header {
        align-items: flex-start;
        flex-direction: column;
      }

      .site-nav {
        gap: 20px;
        flex-wrap: wrap;
      }

      .dropdown-menu {
        left: 0;
        top: calc(100% + 10px);
        transform: none;
      }

      main {
        padding-top: 36px;
      }

      .anchor-section {
        margin-top: 68px;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <a class="brand-lockup" href="./index.html" data-text="home.title">Yuanlong Yu</a>
      <nav class="site-nav" aria-label="Main navigation">
        <a class="nav-link" href="./index.html" data-text="nav.home">Home</a>
        <div class="nav-item" id="work-menu">
          <a class="nav-link" href="#work" id="work-trigger" data-text="nav.work">Work</a>
          <div class="dropdown-menu" aria-label="Work categories">
            <a class="dropdown-link" href="./design.html" data-text="home.menu.design">Design</a>
            <a class="dropdown-link" href="./photography.html" data-text="home.menu.photography">Photography</a>
          </div>
        </div>
        <a class="nav-link" href="./about.html" data-text="nav.about">About</a>
        
      </nav>
    </header>

    <main>
      <section class="home-layout">
        <section class="hero-block" id="work">
          <div class="hero-image-frame">
            <img src="./assets/images/homepage.png" alt="Yuanlong Yu homepage image">
          </div>
        </section>

        <section class="intro-block" aria-label="Homepage introduction">
          <p class="intro-line" data-text="home.intro.1">Placeholder text for your introduction.</p>
        </section>

      </section>
    </main>
  </div>
  <script src="./content/text.js"></script>
  <script>
    window.applySiteText();

    const workMenu = document.getElementById("work-menu");
    const workTrigger = document.getElementById("work-trigger");

    workTrigger.addEventListener("click", function (event) {
      event.preventDefault();
      workMenu.classList.toggle("is-open");
    });

    document.addEventListener("click", function (event) {
      if (!workMenu.contains(event.target)) {
        workMenu.classList.remove("is-open");
      }
    });
  </script>
</body>
</html>
