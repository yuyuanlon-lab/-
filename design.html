<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-page-title="design.pageTitle">Design - Yuanlong Yu</title>
  <style>
    :root {
      --page-bg: #ffffff;
      --text: #6f6f6b;
      --line: #8a867f;
      --max-width: 1296px;
      --content-width: 1248px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "DIN Alternate", "DIN", "Bahnschrift", "Helvetica Neue", Arial, sans-serif;
      background: var(--page-bg);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page-shell {
      width: min(100%, var(--max-width));
      margin: 0 auto;
      padding: 18px 24px 40px;
    }

    .site-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      position: sticky;
      top: 0;
      z-index: 20;
      padding: 10px 0 14px;
      background: var(--page-bg);
      border-bottom: 1px solid var(--line);
      color: var(--text);
    }

    .brand-lockup {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .site-nav {
      display: flex;
      align-items: center;
      gap: 34px;
      flex-wrap: wrap;
    }

    .nav-item {
      position: relative;
      display: inline-flex;
      align-items: center;
    }

    .nav-link {
      font-size: 1rem;
      font-weight: 700;
    }

    .dropdown-menu {
      position: absolute;
      top: calc(100% + 10px);
      left: 50%;
      transform: translateX(-50%);
      display: none;
      min-width: 180px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid rgba(138, 134, 127, 0.55);
      text-align: left;
      z-index: 10;
    }

    .dropdown-menu::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: -10px;
      height: 10px;
    }

    .nav-item:hover .dropdown-menu,
    .nav-item:focus-within .dropdown-menu,
    .nav-item.is-open .dropdown-menu {
      display: block;
    }

    .dropdown-link {
      display: block;
      padding: 8px 10px;
      font-size: 1rem;
      font-weight: 700;
      white-space: nowrap;
      transition: background-color 160ms ease;
    }

    .dropdown-link:hover,
    .dropdown-link:focus-visible {
      background: rgba(0, 0, 0, 0.08);
    }

    main {
      padding-top: 54px;
      text-align: center;
    }

    .page-title {
      margin: 0 0 14px;
      font-size: 1.7rem;
      font-weight: 700;
      color: var(--text);
    }

    .content-block {
      width: min(100%, var(--content-width));
      margin: 0 auto 120px;
    }

    .project-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      column-gap: 52px;
      row-gap: 88px;
      margin-top: 88px;
    }

    .project-card {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .project-link {
      position: relative;
      display: block;
      width: 100%;
    }

    .project-image {
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: #e9dfd0;
    }

    .project-hover-title {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #111111;
      opacity: 0;
      transition: opacity 220ms ease;
      pointer-events: none;
      text-align: center;
      text-transform: uppercase;
    }

    .project-image img,
    .project-image iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .project-image img {
      object-fit: cover;
      transform: scale(1);
      transition: transform 220ms ease, opacity 220ms ease;
    }

    .project-link:hover .project-image img,
    .project-link:focus-visible .project-image img {
      transform: scale(1.1);
      opacity: 0.8;
    }

    .project-link:hover .project-hover-title,
    .project-link:focus-visible .project-hover-title {
      opacity: 1;
    }

    .project-index {
      margin-top: 20px;
      font-size: 1rem;
      font-weight: 700;
      color: #111111;
      line-height: 1;
      text-align: center;
    }

    @media (max-width: 720px) {
      .page-shell {
        padding: 16px 16px 32px;
      }

      .site-header {
        align-items: flex-start;
        flex-direction: column;
      }

      .site-nav {
        gap: 20px;
      }

      .dropdown-menu {
        left: 0;
        top: calc(100% + 10px);
        transform: none;
      }

      main {
        padding-top: 36px;
      }

      .content-block {
        margin: 0 auto 72px;
      }

      .project-grid {
        grid-template-columns: 1fr;
        column-gap: 0;
        row-gap: 48px;
        margin-top: 72px;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <a class="brand-lockup" href="./index.html" data-text="home.title">Yuanlong Yu</a>
      <nav class="site-nav" aria-label="Main navigation">
        <a class="nav-link" href="./index.html" data-text="nav.home">Home</a>
        <div class="nav-item" id="work-menu">
          <a class="nav-link" href="./design.html" id="work-trigger" data-text="nav.work">Work</a>
          <div class="dropdown-menu" aria-label="Work categories">
            <a class="dropdown-link" href="./design.html" data-text="home.menu.design">Design</a>
            <a class="dropdown-link" href="./photography.html" data-text="home.menu.photography">Photography</a>
          </div>
        </div>
        <a class="nav-link" href="./about.html" data-text="nav.about">About</a>
        
      </nav>
    </header>
    <main>
      <section class="content-block">
        <h1 class="page-title" data-text="design.pageTitle">Design</h1>
        <section class="project-grid" aria-label="Design projects">
          <article class="project-card">
            <a class="project-link" href="./architecture-01.html">
              <div class="project-image" data-asset-base="architecture-01" data-asset-alt="Design project 01"></div>
              <div class="project-hover-title">Walls of history</div>
            </a>
            <span class="project-index">01</span>
          </article>
          <article class="project-card">
            <a class="project-link" href="./architecture-02.html">
              <div class="project-image" data-asset-base="architecture-02" data-asset-alt="Design project 02"></div>
              <div class="project-hover-title">Pavilion on the roof</div>
            </a>
            <span class="project-index">02</span>
          </article>
          <article class="project-card">
            <a class="project-link" href="./architecture-03.html">
              <div class="project-image" data-asset-base="architecture-03" data-asset-alt="Design project 03"></div>
              <div class="project-hover-title">Boarden the boundary</div>
            </a>
            <span class="project-index">03</span>
          </article>
          <article class="project-card">
            <a class="project-link" href="./architecture-04.html">
              <div class="project-image" data-asset-base="architecture-04" data-asset-alt="Design project 04"></div>
              <div class="project-hover-title">park for all</div>
            </a>
            <span class="project-index">04</span>
          </article>
          <article class="project-card">
            <a class="project-link" href="./architecture-05.html">
              <div class="project-image" style="background: transparent;"><img src="./assets/images/architecture-05-cover.png" alt="Design project 05"></div>
              <div class="project-hover-title">Bridge</div>
            </a>
            <span class="project-index">05</span>
          </article>
          <article class="project-card">
            <a class="project-link" href="./architecture-06.html">
              <div class="project-image" data-asset-base="architecture-06" data-asset-alt="Design project 06"></div>
              <div class="project-hover-title">Break the frame</div>
            </a>
            <span class="project-index">06</span>
          </article>
          <article class="project-card">
            <a class="project-link" href="./architecture-07.html">
              <div class="project-image" data-asset-base="architecture-07" data-asset-alt="Design project 07"></div>
              <div class="project-hover-title">Shijing Urbanism</div>
            </a>
            <span class="project-index">07</span>
          </article>
          <article class="project-card">
            <a class="project-link" href="./architecture-08.html">
              <div class="project-image" data-asset-base="architecture-08" data-asset-alt="Design project 08"></div>
              <div class="project-hover-title">Floating Oasis</div>
            </a>
            <span class="project-index">08</span>
          </article>
          <article class="project-card">
            <a class="project-link" href="./architecture-09.html">
              <div class="project-image" data-asset-base="architecture-09" data-asset-alt="Design project 09"></div>
              <div class="project-hover-title">Luban Lock</div>
            </a>
            <span class="project-index">09</span>
          </article>
        </section>
      </section>
    </main>
  </div>
  <script src="./content/text.js"></script>
  <script>
    window.applySiteText();

    const workMenu = document.getElementById("work-menu");
    const workTrigger = document.getElementById("work-trigger");

    if (workMenu && workTrigger) {
      workTrigger.addEventListener("click", function (event) {
        event.preventDefault();
        workMenu.classList.toggle("is-open");
      });

      document.addEventListener("click", function (event) {
        if (!workMenu.contains(event.target)) {
          workMenu.classList.remove("is-open");
        }
      });
    }

    const assetExtensions = ["png", "jpg", "jpeg", "webp", "pdf"];

    function renderAsset(container, extension, altText) {
      if (extension === "pdf") {
        const frame = document.createElement("iframe");
        frame.src = `./assets/images/${container.dataset.assetBase}.${extension}#view=FitH`;
        frame.title = altText;
        frame.loading = "lazy";
        container.appendChild(frame);
        return;
      }

      const image = document.createElement("img");
      image.src = `./assets/images/${container.dataset.assetBase}.${extension}`;
      image.alt = altText;
      container.appendChild(image);
    }

    function loadAsset(container) {
      const base = container.dataset.assetBase;
      const altText = container.dataset.assetAlt || base;
      let current = 0;

      function tryNext() {
        if (current >= assetExtensions.length) {
          container.textContent = "Missing Asset";
          return;
        }

        const extension = assetExtensions[current++];

        if (extension === "pdf") {
          fetch(`./assets/images/${base}.${extension}`, { method: "HEAD" })
            .then((response) => {
              if (response.ok) {
                renderAsset(container, extension, altText);
              } else {
                tryNext();
              }
            })
            .catch(tryNext);
          return;
        }

        const probe = new Image();
        probe.onload = function () {
          renderAsset(container, extension, altText);
        };
        probe.onerror = tryNext;
        probe.src = `./assets/images/${base}.${extension}`;
      }

      tryNext();
    }

    document.querySelectorAll("[data-asset-base]").forEach(loadAsset);
  </script>
</body>
</html>
