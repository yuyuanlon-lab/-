<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-page-title="photography.pageTitle">Photography - Yuanlong Yu</title>
  <style>
    :root {
      --page-bg: #ffffff;
      --text: #6f6f6b;
      --line: #8a867f;
      --max-width: 1296px;
      --content-width: 1000px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "DIN Alternate", "DIN", "Bahnschrift", "Helvetica Neue", Arial, sans-serif;
      background: var(--page-bg);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page-shell {
      width: min(100%, var(--max-width));
      margin: 0 auto;
      padding: 18px 24px 40px;
    }

    .site-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      position: sticky;
      top: 0;
      z-index: 20;
      padding: 10px 0 14px;
      background: var(--page-bg);
      border-bottom: 1px solid var(--line);
      color: var(--text);
    }

    .brand-lockup {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .site-nav {
      display: flex;
      align-items: center;
      gap: 34px;
      flex-wrap: wrap;
    }

    .nav-item {
      position: relative;
      display: inline-flex;
      align-items: center;
    }

    .nav-link {
      font-size: 1rem;
      font-weight: 700;
    }

    .dropdown-menu {
      position: absolute;
      top: calc(100% + 10px);
      left: 50%;
      transform: translateX(-50%);
      display: none;
      min-width: 180px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid rgba(138, 134, 127, 0.55);
      text-align: left;
      z-index: 10;
    }

    .dropdown-menu::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: -10px;
      height: 10px;
    }

    .nav-item:hover .dropdown-menu,
    .nav-item:focus-within .dropdown-menu,
    .nav-item.is-open .dropdown-menu {
      display: block;
    }

    .dropdown-link {
      display: block;
      padding: 8px 10px;
      font-size: 1rem;
      font-weight: 700;
      white-space: nowrap;
      transition: background-color 160ms ease;
    }

    .dropdown-link:hover,
    .dropdown-link:focus-visible {
      background: rgba(0, 0, 0, 0.08);
    }

    main {
      padding-top: 54px;
      text-align: center;
    }

    .page-title {
      margin: 0 0 14px;
      font-size: 1.7rem;
      font-weight: 700;
      color: var(--text);
    }

    .page-copy {
      width: min(100%, 600px);
      margin: 0 auto;
      color: var(--text);
      line-height: 1.9;
      font-weight: 600;
    }

    .content-block {
      width: min(100%, var(--content-width));
      margin: 88px auto 0;
    }

    @media (max-width: 720px) {
      .page-shell {
        padding: 16px 16px 32px;
      }

      .site-header {
        align-items: flex-start;
        flex-direction: column;
      }

      .site-nav {
        gap: 20px;
      }

      .dropdown-menu {
        left: 0;
        top: calc(100% + 10px);
        transform: none;
      }

      main {
        padding-top: 36px;
      }

      .content-block {
        margin-top: 68px;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <a class="brand-lockup" href="./index.html" data-text="home.title">Yuanlong Yu</a>
      <nav class="site-nav" aria-label="Main navigation">
        <a class="nav-link" href="./index.html" data-text="nav.home">Home</a>
        <div class="nav-item" id="work-menu">
          <a class="nav-link" href="./design.html" id="work-trigger" data-text="nav.work">Work</a>
          <div class="dropdown-menu" aria-label="Work categories">
            <a class="dropdown-link" href="./design.html" data-text="home.menu.design">Design</a>
            <a class="dropdown-link" href="./photography.html" data-text="home.menu.photography">Photography</a>
          </div>
        </div>
        <a class="nav-link" href="./about.html" data-text="nav.about">About</a>
        
      </nav>
    </header>
    <main>
      <section class="content-block">
        <h1 class="page-title" data-text="photography.pageTitle">Photography</h1>
        <p class="page-copy" data-text="photography.pageCopy">Placeholder text for photography work. You can replace this page with image series, captions, and project-based visual documentation.</p>
      </section>
    </main>
  </div>
  <script src="./content/text.js"></script>
  <script>
    window.applySiteText();

    const workMenu = document.getElementById("work-menu");
    const workTrigger = document.getElementById("work-trigger");

    if (workMenu && workTrigger) {
      workTrigger.addEventListener("click", function (event) {
        event.preventDefault();
        workMenu.classList.toggle("is-open");
      });

      document.addEventListener("click", function (event) {
        if (!workMenu.contains(event.target)) {
          workMenu.classList.remove("is-open");
        }
      });
    }
  </script>
</body>
</html>
