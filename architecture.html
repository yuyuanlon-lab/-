<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-page-title="architecture.pageTitle">Architecture - Yuanlong Yu</title>
  <style>
    :root {
      --page-bg: #ffffff;
      --text: #6f6f6b;
      --line: #8a867f;
      --max-width: 1296px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "DIN Alternate", "DIN", "Bahnschrift", "Helvetica Neue", Arial, sans-serif;
      background: var(--page-bg);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page-shell {
      width: min(100%, var(--max-width));
      margin: 0 auto;
      padding: 18px 24px 40px;
    }

    .site-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      padding: 10px 0 14px;
      border-bottom: 1px solid var(--line);
      color: var(--text);
    }

    .brand-lockup {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .site-nav {
      display: flex;
      align-items: center;
      gap: 34px;
      flex-wrap: wrap;
    }

    .nav-link {
      font-size: 1rem;
      font-weight: 700;
    }

    main {
      padding-top: 54px;
      text-align: center;
    }

    .page-title {
      margin: 0 0 14px;
      font-size: 1.7rem;
      font-weight: 700;
      color: var(--text);
    }

    .page-copy {
      width: min(100%, 600px);
      margin: 0 auto;
      color: var(--text);
      line-height: 1.9;
      font-weight: 600;
    }

    .content-block {
      width: min(100%, 1420px);
      margin: 0 auto 120px;
    }

    .project-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      column-gap: 170px;
      row-gap: 120px;
      margin-top: 110px;
    }

    .project-card {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .project-link {
      display: block;
      width: 100%;
    }

    .project-image {
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: #e9dfd0;
    }

    .project-image img,
    .project-image iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .project-image img {
      object-fit: cover;
      transform: scale(1);
      transition: transform 220ms ease;
    }

    .project-link:hover .project-image img,
    .project-link:focus-visible .project-image img {
      transform: scale(1.1);
    }

    .project-index {
      margin-top: 20px;
      font-size: 1rem;
      font-weight: 700;
      color: #111111;
      line-height: 1;
    }

    @media (max-width: 720px) {
      .page-shell {
        padding: 16px 16px 32px;
      }

      .site-header {
        align-items: flex-start;
        flex-direction: column;
      }

      .site-nav {
        gap: 20px;
      }

      main {
        padding-top: 36px;
      }

      .content-block {
        margin: 0 auto 72px;
      }

      .project-grid {
        grid-template-columns: 1fr;
        column-gap: 0;
        row-gap: 48px;
        margin-top: 72px;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <a class="brand-lockup" href="./index.html" data-text="home.title">Yuanlong Yu</a>
      <nav class="site-nav" aria-label="Main navigation">
        <a class="nav-link" href="./design.html" data-text="nav.work">Work</a>
        <a class="nav-link" href="./about.html" data-text="nav.about">About</a>
        
      </nav>
    </header>
    <main>
      <section class="content-block">
        <h1 class="page-title" data-text="architecture.pageTitle">Architecture</h1>
        <p class="page-copy" data-text="architecture.pageCopy">Placeholder text for architecture projects. You can replace this page with selected works, drawings, plans, models, and project descriptions.</p>
        <section class="project-grid" aria-label="Architecture projects">
          <article class="project-card">
            <a class="project-link" href="./architecture-01.html">
              <div class="project-image" data-asset-base="architecture-01" data-asset-alt="Architecture project 01"></div>
            </a>
            <span class="project-index">01</span>
          </article>
          <article class="project-card">
            <a class="project-link" href="./architecture-02.html">
              <div class="project-image" data-asset-base="architecture-02" data-asset-alt="Architecture project 02"></div>
            </a>
            <span class="project-index">02</span>
          </article>
          <article class="project-card">
            <a class="project-link" href="./architecture-03.html">
              <div class="project-image" data-asset-base="architecture-03" data-asset-alt="Architecture project 03"></div>
            </a>
            <span class="project-index">03</span>
          </article>
          <article class="project-card">
            <a class="project-link" href="./architecture-04.html">
              <div class="project-image" data-asset-base="architecture-04" data-asset-alt="Architecture project 04"></div>
            </a>
            <span class="project-index">04</span>
          </article>
          <article class="project-card">
            <a class="project-link" href="./architecture-05.html">
              <div class="project-image" style="background: transparent;"><img src="./assets/images/architecture-05-cover.png" alt="Architecture project 05"></div>
            </a>
            <span class="project-index">05</span>
          </article>
          <article class="project-card">
            <a class="project-link" href="./architecture-06.html">
              <div class="project-image" data-asset-base="architecture-06" data-asset-alt="Architecture project 06"></div>
            </a>
            <span class="project-index">06</span>
          </article>
        </section>
      </section>
    </main>
  </div>
  <script src="./content/text.js"></script>
  <script>
    window.applySiteText();

    const assetExtensions = ["png", "jpg", "jpeg", "webp", "pdf"];

    function renderAsset(container, extension, altText) {
      if (extension === "pdf") {
        const frame = document.createElement("iframe");
        frame.src = `./assets/images/${container.dataset.assetBase}.${extension}#view=FitH`;
        frame.title = altText;
        frame.loading = "lazy";
        container.appendChild(frame);
        return;
      }

      const image = document.createElement("img");
      image.src = `./assets/images/${container.dataset.assetBase}.${extension}`;
      image.alt = altText;
      container.appendChild(image);
    }

    function loadAsset(container) {
      const base = container.dataset.assetBase;
      const altText = container.dataset.assetAlt || base;
      let current = 0;

      function tryNext() {
        if (current >= assetExtensions.length) {
          container.textContent = "Missing Asset";
          return;
        }

        const extension = assetExtensions[current++];

        if (extension === "pdf") {
          fetch(`./assets/images/${base}.${extension}`, { method: "HEAD" })
            .then((response) => {
              if (response.ok) {
                renderAsset(container, extension, altText);
              } else {
                tryNext();
              }
            })
            .catch(tryNext);
          return;
        }

        const probe = new Image();
        probe.onload = function () {
          renderAsset(container, extension, altText);
        };
        probe.onerror = tryNext;
        probe.src = `./assets/images/${base}.${extension}`;
      }

      tryNext();
    }

    document.querySelectorAll("[data-asset-base]").forEach(loadAsset);
  </script>
</body>
</html>
